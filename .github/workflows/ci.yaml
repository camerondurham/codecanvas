name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.17"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json
      - name: Run CI checks
        run: make ci

  frontend-v2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-frontend-v2/package-lock.json
      - name: Install frontend v2 dependencies
        run: npm ci
      - name: Typecheck frontend v2
        run: npm run check
      - name: Build frontend v2 with GitHub Pages settings
        run: npm run build:pages
